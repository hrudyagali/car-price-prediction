<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right,#141e30,#243b55);
            color:white;
            text-align:center;
        }

        h1{
            margin-top:30px;
            font-size:40px;
        }

        .container{
            background:white;
            color:black;
            width:45%;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.5);
            margin-top:30px;
        }

        select,input{
            width:90%;
            padding:12px;
            margin:10px;
            border-radius:8px;
            border:1px solid gray;
            font-size:15px;
        }

        button{
            background:#007BFF;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            margin-top:15px;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            font-size:24px;
            color:green;
            font-weight:bold;
        }

        footer{
            margin-top:40px;
            color:#ccc;
        }
    </style>
</head>

<body>

<h1>Car Price Predictor</h1>

<div class="container">
<form action="/predict" method="post">

<select name="brand" required>
<option value="">Select Brand</option>
{% for b in brands %}
<option value="{{b}}">{{b}}</option>
{% endfor %}
</select>

<select name="model" required>
<option value="">Select Model</option>
{% for m in models %}
<option value="{{m}}">{{m}}</option>
{% endfor %}
</select>

<input type="number" name="year" placeholder="Manufacturing Year" required>
<input type="number" name="km" placeholder="Kilometers Driven" required>

<select name="fuel">
<option>Petrol</option>
<option>Diesel</option>
<option>CNG</option>
<option>LPG</option>
</select>

<select name="seller">
<option>Individual</option>
<option>Dealer</option>
<option>Trustmark Dealer</option>
</select>

<select name="transmission">
<option>Manual</option>
<option>Automatic</option>
</select>

<select name="owner">
<option>First Owner</option>
<option>Second Owner</option>
<option>Third Owner</option>
<option>Fourth & Above Owner</option>
<option>Test Drive Car</option>
</select>

<button type="submit">Predict Price</button>

<div class="result">
{{ prediction_text }}
</div>

</form>
</div>

<footer>
<p>ML Project | Gradient Boosting Car Price Prediction</p>
</footer>

</body>
</html>
